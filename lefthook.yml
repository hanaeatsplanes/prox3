pre-commit:
  parallel: true
  jobs:
    - name: lint
      run: bun run lint
      stage_fixed: true
pre-push:
  parallel: true
  jobs:
    - name: lint
      run: bun run lint
      stage_fixed: true
    - name: update
      run: bun update --latest
    - name: migrate
      run: biome migrate --write
    - name: build
      run: bun run build